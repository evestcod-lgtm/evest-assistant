name: Build Evest Assistant APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PATH: app/release.keystore
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # This repository does not ship a committed gradle-wrapper.jar binary.
      # gradle/actions/setup-gradle installs a matching Gradle distribution
      # directly and provisions the wrapper, so ./gradlew works normally
      # in the steps below without needing a pre-built jar in the repo.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'


      - name: Set up Python (for icon generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      - name: Generate app icon (if icon/icon.png provided)
        run: |
          if [ -f "icon/icon.png" ]; then
            echo "Found icon/icon.png — generating launcher icons"
            python3 tools/generate_icons.py icon/icon.png
          else
            echo "No icon/icon.png found — keeping default placeholder icon"
          fi

      - name: Check for Vosk offline speech model
        run: |
          if [ -f "app/src/main/assets/vosk-model/README.md" ] && [ $(find app/src/main/assets/vosk-model -type f | wc -l) -le 1 ]; then
            echo "::warning::Vosk model not found in app/src/main/assets/vosk-model/ (only README present)."
            echo "::warning::App will build, but wake-word activation AND command recognition"
            echo "::warning::will not work until you add it — both features share this one model."
            echo "::warning::See app/src/main/assets/vosk-model/README.md."
          else
            echo "Vosk model files found — wake-word activation and command recognition will be functional."
          fi

      - name: Decode release keystore (optional)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ env.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: gradle assembleRelease --stacktrace

      - name: Build debug APK (always installable, no signing needed)
        run: gradle assembleDebug --stacktrace

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evest-assistant-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: evest-assistant-debug-apk
          path: app/build/outputs/apk/debug/*.apk
